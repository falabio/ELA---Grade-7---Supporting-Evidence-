        let currentSlide = 0;
        const slideContent = document.getElementById('slide-content');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const slideCounter = document.getElementById('slide-counter');
        const teacherNote = document.getElementById('teacher-note');

        function renderSlide() {
            const slide = slides[currentSlide];
            
            // Apply animation class
            slideContent.innerHTML = ''; // Clear current
            
            setTimeout(() => {
                slideContent.innerHTML = `
                    <div class="slide-enter w-full h-full flex flex-col justify-start">
                        <div class="mb-10 text-center md:text-left border-b border-slate-200 pb-4">
                            <h2 class="text-sm font-bold text-orange-600 uppercase tracking-widest mb-1">${slide.subtitle}</h2>
                        </div>
                        <div class="flex-1 flex flex-col justify-center items-center w-full">
                            ${slide.content}
                        </div>
                    </div>
                `;
            }, 10); // Tiny delay to re-trigger animation

            // Update UI elements
            slideCounter.textContent = `Slide ${currentSlide + 1} / ${slides.length}`;
            teacherNote.innerHTML = `<span class="text-orange-600 mr-2">TUTOR NOTE:</span> ${slide.note}`;
            
            // Button states
            btnPrev.disabled = currentSlide === 0;
            if (currentSlide === slides.length - 1) {
                btnNext.innerHTML = 'Finish <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-2" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>';
                btnNext.classList.replace('bg-orange-600', 'bg-green-600');
                btnNext.classList.replace('hover:bg-orange-700', 'hover:bg-green-700');
            } else {
                btnNext.innerHTML = 'Next <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-2" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>';
                btnNext.classList.replace('bg-green-600', 'bg-orange-600');
                btnNext.classList.replace('hover:bg-green-700', 'hover:bg-orange-700');
            }
        }

        btnPrev.addEventListener('click', () => {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        });

        btnNext.addEventListener('click', () => {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                renderSlide();
            } else {
                alert("Presentation complete. Time to start the worksheet.");
            }
        });

        // Add keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' && currentSlide < slides.length - 1) {
                currentSlide++;
                renderSlide();
            } else if (e.key === 'ArrowLeft' && currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        });

        // Init
        renderSlide();
    </script>
